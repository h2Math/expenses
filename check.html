<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Signup Test - Please test</h2>
    
    <input type="email" id="email" placeholder="Email" style="width:250px"><br><br>
    <input type="password" id="password" placeholder="Password" style="width:250px"><br><br>
    <button onclick="doSignup()">Sign Up</button>
    <button onclick="doSignin()">Sign In</button>
    
    <div id="result" style="margin-top:20px; padding:10px; background:#eee; white-space:pre-wrap;"></div>

    <script>
        // ⚠️ YOUR CREDENTIALS SHOULD BE HERE ⚠️
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const result = document.getElementById('result');
        
        async function doSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                result.innerHTML = '❌ Please enter both email and password';
                return;
            }
            
            result.innerHTML = '⏳ Attempting signup...\n\n';
            result.innerHTML += `Email: ${email}\n`;
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                });
                
                if (error) {
                    result.innerHTML += `\n❌ ERROR: ${error.message}\n`;
                    result.innerHTML += `\nFull error: ${JSON.stringify(error, null, 2)}`;
                } else {
                    result.innerHTML += `\n✅ SUCCESS!\n`;
                    result.innerHTML += `User: ${data.user?.email}\n`;
                    result.innerHTML += `ID: ${data.user?.id}\n`;
                    
                    if (data.user?.confirmed_at) {
                        result.innerHTML += `Confirmed: Yes\n`;
                    } else {
                        result.innerHTML += `Confirmed: No (check email)\n`;
                    }
                }
            } catch (err) {
                result.innerHTML += `\n❌ EXCEPTION: ${err.message}\n`;
                result.innerHTML += `\nStack: ${err.stack}`;
            }
        }
        
        async function doSignin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                result.innerHTML = '❌ Please enter both email and password';
                return;
            }
            
            result.innerHTML = '⏳ Attempting signin...\n\n';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });
                
                if (error) {
                    result.innerHTML += `\n❌ ERROR: ${error.message}\n`;
                    result.innerHTML += `\nFull error: ${JSON.stringify(error, null, 2)}`;
                } else {
                    result.innerHTML += `\n✅ LOGGED IN!\n`;
                    result.innerHTML += `User: ${data.user?.email}\n`;
                    result.innerHTML += `ID: ${data.user?.id}\n`;
                }
            } catch (err) {
                result.innerHTML += `\n❌ EXCEPTION: ${err.message}\n`;
            }
        }
    </script>
</body>
</html>
